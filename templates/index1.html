<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMR Result Predictor</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f4f7f6;
        color: #333;
      }

      .card {
        background-color: #ffffff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }

      h2 {
        margin-bottom: 20px;
        font-size: 24px;
        color: #2c3e50;
        text-align: center;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #4a5568;
        font-size: 14px;
      }

      input[type="number"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s;
      }

      input[type="number"]:focus {
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
      }

      input[type="submit"] {
        width: 100%;
        background-color: #3498db;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      input[type="submit"]:hover {
        background-color: #2980b9;
      }

      /* ── Result Box ── */
      .result-box {
        margin-top: 24px;
        padding: 16px;
        border-radius: 8px;
        text-align: center;
      }

      .result-box .result-label {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #6b7280;
        margin-bottom: 6px;
      }

      .result-box .result-value {
        font-size: 26px;
        font-weight: 700;
        color: #2c3e50;
      }

      /* Color the result badge based on BMR condition */
      .result-box.normal {
        background-color: #d1fae5;
        border: 1px solid #6ee7b7;
      }
      .result-box.obese {
        background-color: #fee2e2;
        border: 1px solid #fca5a5;
      }
      .result-box.overweight {
        background-color: #fef3c7;
        border: 1px solid #fcd34d;
      }
      .result-box.underweight {
        background-color: #e0f2fe;
        border: 1px solid #7dd3fc;
      }
      .result-box.default {
        background-color: #f3f4f6;
        border: 1px solid #d1d5db;
      }

      /* ── Error Box ── */
      .error-box {
        margin-top: 20px;
        padding: 14px;
        background-color: #fee2e2;
        border: 1px solid #fca5a5;
        border-radius: 8px;
        color: #b91c1c;
        font-size: 14px;
        font-weight: 500;
        text-align: center;
      }

      .divider {
        border: none;
        border-top: 1px solid #e5e7eb;
        margin: 24px 0 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>BMR Calculator</h2>

      <form action="/" method="POST">
        <label for="height">Height (cm):</label>
        <input
          type="number"
          id="height"
          name="height"
          placeholder="e.g. 175"
          step="0.1"
          required
        />

        <label for="weight">Weight (kg):</label>
        <input
          type="number"
          id="weight"
          name="weight"
          placeholder="e.g. 70"
          step="0.1"
          required
        />

        <input type="submit" value="Predict BMR Condition" />
      </form>

      <!-- ── Error Message ── -->
      {% if error %}
      <div class="error-box">⚠️ {{ error }}</div>
      {% endif %}

      <!-- ── Prediction Result ── -->
      {% if pred %}
      <hr class="divider" />
      <div class="result-box {{ pred | lower | replace(' ', '') }}">
        <div class="result-label">Your BMR Condition</div>
        <div class="result-value">{{ pred }}</div>
      </div>
      {% endif %}
    </div>
  </body>
</html>
